body:
  text: 上清太上廻元隱道除罪籍經承八太上玉眞隱元内觀用六甲之旬六丁之日夜半是生氣之時天元敷陳胞結重固七魄上言三魂記過違愆七祖積罰三隂故有消除之法以解脫愆罪施此道者乃曰求仙之夫者矣常以甲子之旬丁卯之日夜半之時於寢室牀上平坐北向接手叩齒七通畢乃仰存七星使煥明於北方良乆微呪曰第一太星玄樞陽明魂神上玄九君作七呼之乃又祝曰願得除某七世已來下逮某身陽罪陽過皆令消除所向如願萬事合心飛步七元與天相傾名刊斗晨延紀億年畢乃存北斗七星從天來下飛入我口徑在心中存星光令内外洞徹極思念之此謂解晨結羅内暎上道甲戌之旬丁丑之日夜半之時於寢室牀上平坐北向接手先叩齒七通畢乃仰存七星使煥明於北方良乆微呪曰第二元星北台隂精天璿魂神上玉九君作七呼之乃又祝日願得除某七世己來下逮某身隂罪隂過皆令消除六氣盈滿四神用虚飛行七元名刊玉書上登紫清乘玄駕無出入利貞與天同符畢乃存北斗七星從天中而來飛入我口徑在肺中使洞鑑内外五藏分明又存星來入口當令自覺光芒四散滿口口中覺小熱即星精來入之驗也諸思七元存九晨之道所寢牀席不與他人同止衣服亦然男女同席而息者乃列罪北玄之籍若犯乎洿穢者殃注於地獄也師友同氣不爲犯也甲申之旬丁亥之日夜半之時於寢室牀上平坐北向接手叩齒七通畢乃仰天存七星使煥明於北方良久微祝曰第三眞星九極上眞上元眞人天機魄精上素九君作七呼之乃祝曰願得某七祖己來下逮某身死罪死過積惡私慝犯違天地水三官者皆令消除目明徹視洞監幽無飛行七元名書上清役使萬神上登玉庭駕景乘空與天相傾畢乃存北斗七星從天來下飛入我口徑在肝中使光照五藏内外洞明畢心存北向再拜拜畢咽液九過亦可起拜甲午之旬丁酉之日夜半之時於寢室牀上平坐北向接手叩齒七通乃仰存七星使煥明於北方良久微祝曰第四紐星璇根玄冥天權魄精上虚九君作七呼之又祝曰願得除某七世以來下逮某身無恩無德不仁不孝隂惡之罪數千萬計皆令消滅服食納精日以進益飛登七元刊録太玄上列玉皇乘景九天役神御靈日月同新畢乃存北斗七星從天來飛入我口徑在脾中使光明洞徹暎照五藏畢咽液二七過甲辰之旬丁未之日夜半之時於寢室牀上北向平坐接手叩齒七通畢乃仰存七星使煥明於北方良乆微祝曰第五綱星天平丹元玉衡魄靈上元君上玄九皇君作七呼之又祝曰願得除某七世己來下逮某身内外穢罪表裏洗過數千萬億記在幽關者皆令消除當令體充黄庭盈鎮胃中上列太素乘景紫宫右侍玉女左侍玉童日月同暉位爲眞王畢乃存北斗七星從天來下飛入我口徑在胃中使光明洞照五藏分别畢咽液二九過甲寅之旬丁已之日夜半之時於寢室牀上北向接手先叩齒七通乃仰存七星使煥明於北方良乆微祝曰第六紀星命機北極闤陽魄靈上丹眞皇虚無九君作七呼之又祝曰願得除某七世己來下逮某身所犯所行賊惡罪過姦逆亂妄引紀帝官者皆令消滅百痾康愈體氣利貞名書仙臺刻金上清役使萬神飛行九明畢存北斗七星從天來下逕入我口在腎中使光明洞徹五藏分别畢咽液二七過陽日存在左腎隂日存在右腎一日爲陽二日爲隂此道尤禁見血穢臭漫雜食葷辛則上注延於七祖下注禍逮某一身死爲下鬼名除帝門月晦之夕明日月朔未雞鳴之前當於寢室牀上東向接手平坐叩齒七通乃仰存北斗七星使煥明於我之左面良乆微祝曰第七關星玄陽天關瑶光大明太上玉皇道君作七呼之又祝曰願得除某七世己來闇昧匿罪犯天羅五刑身中之神數千萬億記在北帝鬼官者皆令消滅當令某神精八達坐在立亡耳聽絶音目生紫光刊玉太素洞鑑無形名書帝君命均二明飛行七元寢宴紫庭畢存北斗七星從天來下徑入我口從口入至目童中通暎兩眼使内外自照存見五藏使分明陽日存星入左目童隂日存星入右目童六甲日夜半生氣之時於寢室牀卧坐首向隨意也握固而閉氣定神良乆叩齒九通畢存北斗九星使煥明於項上令九星光芒二星在斗柄前光芒以相䁐及於是乃微祝曰第八帝星高上玉皇神八景元君第九尊星太微玉帝君神太素七晨元君九過呼之乃祝曰願得除某九祖父母已來下逮某身諸丘山川源大小罪過名上死籍隂匿賊惡伏姦藏欺事有億萬列在鬼帝酆山上者死罪條例之愆記于北上九元太極眞人黑簿者乞九元太上帝尊玉玄君皆令事事消除飛行七道上登玉清同遊太無乘景晨生北宴八素與日相傾緫朝皇妃攝御萬靈畢又存北斗七星從天來下經入於泥丸紫房中使洞照泥丸令光明接徹一身五藏使内外通生紫光雲氣極令鬱鬱髣髴念之畢咽液三九過若六甲日及月晦日六丁日存恩相彷近者自可以次調適籌量修之不必使頻仍相切近也每事效此唯令全備於眞法也於是太上迴元謝罪之道畢矣太上藏五通日封于五嶽之玉笥隱廻元之道隱於九晨之宫既修五通當行廻元五通開於帝始迴元關於玄終故修五通行七元迴隱道者不食血腥葷物見諸尸穢犯者受太玄考五通者太上之吉日廻元者太上之更新日也不知五通不得解罪除過不知廻元隱道不得列名上眞常以其日思存吉事首謝身中罪過所謂解適七世離脫刑名者也不以示九宫中仙矣諸修洞房紫房中事及存九元七元者眠初起初卧時及臨食食畢先微祝曰五星五通六合紫房迴元隱道豁落七晨生魂者玄父父變一成神生魄者玄母母化二生身攝吾筋骨者公子爲吾精氣者白元長生乆視飛仙十天畢勿令耳聞祝音此太上隱祝以除邪氣致精神使人終身不厭昧也上清大上廻元隱道除罪籍經
